<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Todo Manager</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <h1>📝 Todo Manager</h1>
        <p>Stay organized. Clear your mind.</p>
      </div>

      <div class="header-right">
        <span class="tag">Saved Locally</span>
      </div>
    </header>


    <!-- MAIN CONTENT -->
    <div class="layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">

        <h2>Categories</h2>

        <div id="filter-list" class="filter-list">
          <!-- Filters inserted via JS -->
        </div>

      </aside>



      <!-- MAIN PANEL -->
      <main class="main">

        <!-- ADD TODO CARD -->
        <section class="card add-card">

          <h2>Add Task</h2>

          <form id="todo-form">

            <div class="input-group">
              <input 
                id="todo-input"
                type="text"
                placeholder="What needs to be done?"
                autocomplete="off"
                required
              />
            </div>

            <div class="input-row">

              <input 
                id="cat-input"
                type="text"
                placeholder="Category (work, study, gym...)"
                autocomplete="off"
              />

              <button type="submit">
                + Add Task
              </button>

            </div>

          </form>

        </section>



        <!-- TODO LIST -->
        <section class="card todo-card">

          <div class="list-header">
            <h2>Your Tasks</h2>
            <div class="stats-row">
              <span id="stats-text" class="stats-text">Loading tasks…</span>
              <div class="progress">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
            </div>
          </div>

          <ul id="todo-list">

            <li class="empty-state">
              <div class="empty-icon">📭</div>
              <p>No tasks yet</p>
              <span>Add one above to get started</span>
            </li>

          </ul>

        </section>

      </main>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
